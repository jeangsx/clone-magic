mutation CreateProductEditableMetafields {
  shortPitch: metafieldDefinitionCreate(
    definition: {
      namespace: "custom"
      key: "short_pitch"
      name: "Pitch corto"
      type: "single_line_text_field"
      ownerType: PRODUCT
      access: { storefront: PUBLIC_READ }
    }
  ) {
    createdDefinition { id key }
    userErrors { field message }
  }
  benefit1: metafieldDefinitionCreate(
    definition: {
      namespace: "custom"
      key: "benefit_1"
      name: "Beneficio 1"
      type: "single_line_text_field"
